<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>鋼管 面積計算アプリ</title>
<meta name="description" content="直管、エルボー、レジューサー、枝付き直管、フランジの内外面積を計算できるスマホ対応Webアプリ">
<meta name="theme-color" content="#111111">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#111;background:#f4f6f8}
*{box-sizing:border-box}
body{margin:0;padding:12px}
.app{max-width:760px;margin:auto}
h1{font-size:22px;margin:8px 0 14px}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:13px;font-weight:600;margin-bottom:4px}
input,select,button{width:100%;font-size:16px;padding:12px;border:1px solid #cfd6dd;border-radius:10px;background:#fff}
button{background:#111;color:#fff;font-weight:700;border:none;margin-top:8px}
.result{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result div{background:#eef2f5;border-radius:12px;padding:12px}
.result b{display:block;font-size:20px;margin-top:4px}
.small{font-size:12px;color:#555;line-height:1.5}
.hidden{display:none}
.branch{border-top:1px solid #e4e7ea;padding-top:10px;margin-top:10px}
.note{font-size:12px;color:#666;margin-top:4px}
</style>
</head>
<body>
<div class="app">
<h1>鋼管 内外面積計算</h1>

<div class="card">
<label>管種</label>
<select id="shape" onchange="switchShape()">
<option>直管</option><option>エルボー</option><option>レジューサー</option><option>枝付き直管</option>
</select>
</div>

<div class="card" id="straight">
<div class="grid">
<div><label>管径</label><select id="s_nom" onchange="setOD('s_nom','s_od')"></select></div>
<div><label>外径 D（mm）</label><input id="s_od" type="number" value="114.3" step="0.1"></div>
<div><label>肉厚 t（mm）</label><input id="s_t" type="number" value="4.5" step="0.1"></div>
<div><label>長さ L（mm）</label><input id="s_l" type="number" value="1000" step="1"></div>
</div>
</div>

<div class="card hidden" id="elbow">
<div class="grid">
<div><label>管径</label><select id="e_nom" onchange="setOD('e_nom','e_od')"></select></div>
<div><label>外径 D（mm）</label><input id="e_od" type="number" value="114.3" step="0.1"></div>
<div><label>肉厚 t（mm）</label><input id="e_t" type="number" value="4.5" step="0.1"></div>
<div><label>エルボー角度</label><select id="e_a"><option value="90">90度</option><option value="45">45度</option></select></div>
<div><label>X方向の長さ（mm）</label><input id="e_x" type="number" value="300" step="1"></div>
<div><label>Y方向の長さ（mm）</label><input id="e_y" type="number" value="300" step="1"></div>
<div><label>中心線半径 R（mm）</label><input id="e_r" type="number" value="152.4" step="0.1"></div>
</div>
<div class="note">X方向・Y方向の直管部分と、エルボー曲がり部分を合計して計算します。</div>
</div>

<div class="card hidden" id="reducer">
<div class="grid">
<div><label>大径側 管径</label><select id="r_nom1" onchange="setOD('r_nom1','r_d1')"></select></div>
<div><label>大径側外径 D1（mm）</label><input id="r_d1" type="number" value="165.2" step="0.1"></div>
<div><label>大径側肉厚 t1（mm）</label><input id="r_t1" type="number" value="5.0" step="0.1"></div>
<div><label>小径側 管径</label><select id="r_nom2" onchange="setOD('r_nom2','r_d2')"></select></div>
<div><label>小径側外径 D2（mm）</label><input id="r_d2" type="number" value="114.3" step="0.1"></div>
<div><label>小径側肉厚 t2（mm）</label><input id="r_t2" type="number" value="4.5" step="0.1"></div>
<div><label>長さ L（mm）</label><input id="r_l" type="number" value="200" step="1"></div>
</div>
</div>

<div class="card hidden" id="branch">
<div class="grid">
<div><label>主管 管径</label><select id="b_mnom" onchange="setOD('b_mnom','b_mod')"></select></div>
<div><label>主管外径（mm）</label><input id="b_mod" type="number" value="216.3" step="0.1"></div>
<div><label>主管肉厚（mm）</label><input id="b_mt" type="number" value="6.0" step="0.1"></div>
<div><label>主管長さ（mm）</label><input id="b_ml" type="number" value="1000" step="1"></div>
</div>
<div class="branch">
<div class="grid">
<div><label>枝 管径</label><select id="b_nom" onchange="setOD('b_nom','b_od')"></select></div>
<div><label>枝外径（mm）</label><input id="b_od" type="number" value="114.3" step="0.1"></div>
<div><label>枝肉厚（mm）</label><input id="b_t" type="number" value="4.5" step="0.1"></div>
<div><label>枝長さ（mm）</label><input id="b_l" type="number" value="300" step="1"></div>
<div><label>枝本数</label><input id="b_n" type="number" value="1" min="1" step="1"></div>
</div>
<label style="margin-top:10px"><input id="b_sub" type="checkbox" checked style="width:auto"> 主管開口部を差し引く</label>
</div>
</div>

<div class="card">
<label><input id="useFlange" type="checkbox" checked style="width:auto" onchange="toggleFlange()"> フランジを加算する</label>
<div id="flangeBox" style="margin-top:10px">
<div class="grid">
<div><label>フランジ種類</label><select id="f_type"><option>上水10K</option><option>上水20K</option><option>F12</option><option>5K</option><option>その他</option></select></div>
<div><label>枚数</label><input id="f_n" type="number" value="2" min="0" step="1"></div>
<div><label>外径（mm）</label><input id="f_od" type="number" value="210" step="1"></div>
<div><label>内径（mm）</label><input id="f_id" type="number" value="116" step="1"></div>
<div><label>厚さ（mm）</label><input id="f_t" type="number" value="18" step="1"></div>
<div><label>ボルト穴数</label><input id="f_bn" type="number" value="8" min="0" step="1"></div>
<div><label>ボルト穴径（mm）</label><input id="f_bd" type="number" value="19" step="1"></div>
</div>
<label style="margin-top:10px"><input id="f_wall" type="checkbox" checked style="width:auto"> ボルト穴内壁を含める</label>
</div>
</div>

<div class="card"><button onclick="calculate()">計算する</button></div>

<div class="card">
<div class="result">
<div>管 外面<b id="outOuter">0.000 ㎡</b></div>
<div>管 内面<b id="outInner">0.000 ㎡</b></div>
<div>フランジ<b id="outFlange">0.000 ㎡</b></div>
<div>合計<b id="outTotal">0.000 ㎡</b></div>
</div>
</div>

<div class="card"><button id="installBtn" class="hidden">ホーム画面に追加</button></div>

<div class="card small">管径を選ぶと対応する鋼管外径が自動入力されます。エルボーは90度・45度を選択し、X方向・Y方向の直管長さと曲がり部分を合計します。端面、溶接ビード、複雑な相貫形状は含みません。</div>
<div class="small" style="text-align:center;padding:12px 0 20px">鋼管 面積計算アプリ</div>
</div>

<script>
const pi=Math.PI;
const nominalOD={"15A":21.7,"20A":27.2,"25A":34.0,"32A":42.7,"40A":48.6,"50A":60.5,"65A":76.3,"80A":89.1,"90A":101.6,"100A":114.3,"125A":139.8,"150A":165.2,"200A":216.3,"250A":267.4,"300A":318.5,"350A":355.6,"400A":406.4,"450A":457.2,"500A":508.0,"550A":558.8,"600A":609.6,"650A":660.4,"700A":711.2,"750A":762.0,"800A":812.8,"850A":863.6,"900A":914.4,"950A":965.2,"1000A":1016.0};
const val=id=>Number(document.getElementById(id).value||0);
function fillNominalSelect(id,selected){const s=document.getElementById(id);Object.keys(nominalOD).forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;if(n===selected)o.selected=true;s.appendChild(o);});}
function setOD(selectId,inputId){document.getElementById(inputId).value=nominalOD[document.getElementById(selectId).value];}
function pipeArea(od,t,l){const id=Math.max(od-2*t,0);return [pi*od*l,pi*id*l]}
function switchShape(){["straight","elbow","reducer","branch"].forEach(id=>document.getElementById(id).classList.add("hidden"));const map={"直管":"straight","エルボー":"elbow","レジューサー":"reducer","枝付き直管":"branch"};document.getElementById(map[document.getElementById("shape").value]).classList.remove("hidden");}
function toggleFlange(){document.getElementById("flangeBox").style.display=document.getElementById("useFlange").checked?"block":"none"}
function calculate(){
let outer=0,inner=0,flange=0;
const shape=document.getElementById("shape").value;
if(shape==="直管"){[outer,inner]=pipeArea(val("s_od"),val("s_t"),val("s_l"))}
if(shape==="エルボー"){const arc=2*pi*val("e_r")*(val("e_a")/360);const totalLength=Math.max(val("e_x"),0)+Math.max(val("e_y"),0)+arc;[outer,inner]=pipeArea(val("e_od"),val("e_t"),totalLength);}
if(shape==="レジューサー"){const d1=val("r_d1"),d2=val("r_d2"),t1=val("r_t1"),t2=val("r_t2"),l=val("r_l");const sl1=Math.sqrt(l*l+Math.pow((d1-d2)/2,2));const id1=Math.max(d1-2*t1,0),id2=Math.max(d2-2*t2,0);const sl2=Math.sqrt(l*l+Math.pow((id1-id2)/2,2));outer=pi*((d1+d2)/2)*sl1;inner=pi*((id1+id2)/2)*sl2;}
if(shape==="枝付き直管"){[outer,inner]=pipeArea(val("b_mod"),val("b_mt"),val("b_ml"));const n=Math.max(1,val("b_n"));const [bo,bi]=pipeArea(val("b_od"),val("b_t"),val("b_l"));outer+=bo*n;inner+=bi*n;if(document.getElementById("b_sub").checked){outer-=pi*Math.pow(val("b_od")/2,2)*n;const bid=Math.max(val("b_od")-2*val("b_t"),0);inner-=pi*Math.pow(bid/2,2)*n;}}
if(document.getElementById("useFlange").checked){const fo=val("f_od"),fi=val("f_id"),ft=val("f_t"),bn=val("f_bn"),bd=val("f_bd"),n=val("f_n");const faces=2*pi*(Math.pow(fo/2,2)-Math.pow(fi/2,2));const outerEdge=pi*fo*ft,innerEdge=pi*fi*ft;const holes=2*bn*pi*Math.pow(bd/2,2);const holeWalls=document.getElementById("f_wall").checked?bn*pi*bd*ft:0;flange=(Math.max(faces-holes,0)+outerEdge+innerEdge+holeWalls)*n;}
const m=x=>Math.max(x,0)/1e6;
document.getElementById("outOuter").textContent=m(outer).toFixed(3)+" ㎡";
document.getElementById("outInner").textContent=m(inner).toFixed(3)+" ㎡";
document.getElementById("outFlange").textContent=m(flange).toFixed(3)+" ㎡";
document.getElementById("outTotal").textContent=(m(outer)+m(inner)+m(flange)).toFixed(3)+" ㎡";
}
fillNominalSelect("s_nom","100A");fillNominalSelect("e_nom","100A");fillNominalSelect("r_nom1","150A");fillNominalSelect("r_nom2","100A");fillNominalSelect("b_mnom","200A");fillNominalSelect("b_nom","100A");calculate();

let deferredPrompt;
const installBtn=document.getElementById("installBtn");
window.addEventListener("beforeinstallprompt",(e)=>{e.preventDefault();deferredPrompt=e;installBtn.classList.remove("hidden");});
installBtn.addEventListener("click",async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;installBtn.classList.add("hidden");});
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js"));}
</script>
</body>
</html>
